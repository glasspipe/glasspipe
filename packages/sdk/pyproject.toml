[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "glasspipe"
version = "0.0.0"
description = "The flight recorder for your AI agents."
readme = "../../README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Jonathan" }]
dependencies = [
    "sqlalchemy>=2.0",
    "nanoid",
    "httpx",
    "click",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]
dashboard = ["flask>=3.0"]

[project.scripts]
glasspipe = "glasspipe.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/glasspipe"]
