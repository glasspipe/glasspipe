<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlassPipe — {% block title %}Dashboard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="{{ url_for('static', filename='htmx.min.js') }}"></script>
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a href="/" class="logo"><img src="{{ url_for('static', filename='logo.png') }}" alt="" class="logo-img"><span class="logo-text">glass<span class="accent">pipe</span></span></a>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script>
  (function(){
    function updateFade(wrap) {
      if (!wrap.scrollWidth) return;
      var sl = wrap.scrollLeft;
      wrap.classList.toggle('has-overflow-right', sl + wrap.clientWidth < wrap.scrollWidth - 2);
      wrap.classList.toggle('has-overflow-left', sl > 2);
    }
    function updateAll() {
      document.querySelectorAll('.scroll-fade-wrap').forEach(updateFade);
    }
    document.querySelectorAll('.scroll-fade-wrap').forEach(function(wrap) {
      wrap.addEventListener('scroll', function() { updateFade(wrap); });
    });
    updateAll();
    if ('ResizeObserver' in window) {
      var ro = new ResizeObserver(updateAll);
      document.querySelectorAll('.scroll-fade-wrap').forEach(function(wrap) { ro.observe(wrap); });
    }
    window.addEventListener('resize', updateAll);
  })();
  </script>
</body>
</html>
