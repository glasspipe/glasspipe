<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trace expired — GlassPipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/expired.css">
</head>
<body>
  <header class="topbar">
    <a href="https://github.com/glasspipe/glasspipe" target="_blank" rel="noopener">
      glass<span class="accent">pipe</span>
    </a>
  </header>
  <main>
    <div class="error-card">
      <div class="error-code">410</div>
      <h1 class="error-title">Trace expired</h1>
      <p class="error-body">
        Shared traces are stored for 30 days, then removed automatically.
        This one has passed its expiry date.
      </p>
      <div class="note">Traces expire 30 days after sharing.</div>
      <a class="cta" href="https://github.com/glasspipe/glasspipe" target="_blank" rel="noopener">
        Share a new trace →
      </a>
    </div>
  </main>
</body>
</html>
