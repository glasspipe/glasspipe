<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trace not found — GlassPipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/404.css">
</head>
<body>
  <header class="topbar">
    <a href="https://github.com/glasspipe/glasspipe" target="_blank" rel="noopener">
      glass<span class="accent">pipe</span>
    </a>
  </header>
  <main>
    <div class="error-card">
      <div class="error-code">404</div>
      <h1 class="error-title">Trace not found</h1>
      <p class="error-body">

        It may have been mistyped, or never created.
      </p>
      <a class="cta" href="https://github.com/glasspipe/glasspipe" target="_blank" rel="noopener">
        Create your own trace →
      </a>
    </div>
  </main>
</body>
</html>
